<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRC Awareness Nepal — Risk Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --red: #b91c1c;
  --red-light: #ef4444;
  --red-dark: #7f1d1d;
  --gold: #ca8a04;
  --gold-light: #fbbf24;
  --cream: #fef9f0;
  --bg: #0f0505;
  --bg2: #1c0a0a;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --muted: #9ca3af;
  --text: #f5e6d3;
  --green: #16a34a;
  --green-light: #22c55e;
  --amber: #d97706;
}

*{margin:0;padding:0;box-sizing:border-box;}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Ambient background */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 10%, rgba(185,28,28,0.15) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 85% 90%, rgba(202,138,4,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 80% 60% at 50% 50%, rgba(28,10,10,0.9) 0%, transparent 100%);
  pointer-events:none;
  z-index:0;
}

/* Grain overlay */
body::after {
  content:'';
  position:fixed;
  inset:0;
  opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:0;
}

.app {
  position:relative;
  z-index:1;
  max-width:680px;
  margin:0 auto;
  padding:0 20px 140px;
}

/* ── HEADER ── */
.header {
  padding: 32px 0 20px;
  animation: fadeDown 0.6s ease both;
}

.header-top {
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:8px;
}

.logo {
  width:50px; height:50px;
  border-radius:50%;
  background: linear-gradient(135deg, var(--red), var(--gold));
  display:flex; align-items:center; justify-content:center;
  font-size:22px;
  box-shadow: 0 0 30px rgba(185,28,28,0.4), 0 0 60px rgba(185,28,28,0.15);
  flex-shrink:0;
  animation: pulse 3s ease infinite;
}

@keyframes pulse {
  0%,100%{ box-shadow: 0 0 30px rgba(185,28,28,0.4), 0 0 60px rgba(185,28,28,0.15); }
  50%{ box-shadow: 0 0 40px rgba(185,28,28,0.6), 0 0 80px rgba(185,28,28,0.25); }
}

.header-titles h1 {
  font-family:'Playfair Display', serif;
  font-size:1.5rem;
  color:var(--cream);
  line-height:1.2;
}

.header-titles h1 em {
  font-style:italic;
  color:var(--gold-light);
}

.header-titles p {
  font-size:0.72rem;
  color:var(--muted);
  letter-spacing:0.08em;
  text-transform:uppercase;
  margin-top:3px;
}

/* Lang toggle */
.lang-row {
  display:flex;
  gap:6px;
  margin:12px 0 0 64px;
}

.lang-btn {
  padding:5px 13px;
  border-radius:20px;
  border:1.5px solid var(--border);
  background:transparent;
  color:var(--muted);
  font-family:'DM Sans',sans-serif;
  font-size:0.75rem;
  cursor:pointer;
  transition:all 0.2s;
  letter-spacing:0.03em;
}
.lang-btn.active { background:var(--red); border-color:var(--red); color:white; }
.lang-btn:hover:not(.active) { border-color:rgba(185,28,28,0.5); color:var(--cream); }

/* ── PROGRESS ── */
.progress-section {
  margin:4px 0 16px;
}

.progress-track {
  height:3px;
  background:rgba(255,255,255,0.07);
  border-radius:2px;
  overflow:hidden;
}

.progress-fill {
  height:100%;
  background: linear-gradient(90deg, var(--red), var(--gold-light));
  border-radius:2px;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  width:0%;
}

.progress-meta {
  display:flex;
  justify-content:space-between;
  margin-top:5px;
}

.progress-meta span {
  font-size:0.7rem;
  color:var(--muted);
  letter-spacing:0.05em;
  text-transform:uppercase;
}

/* ── MESSAGES ── */
.messages {
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* Bot message */
.msg-bot {
  display:flex;
  gap:10px;
  animation: bubbleIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}

.bot-av {
  width:34px; height:34px;
  border-radius:50%;
  background: linear-gradient(135deg, var(--red-dark), var(--red));
  display:flex; align-items:center; justify-content:center;
  font-size:14px;
  flex-shrink:0;
  margin-top:2px;
  box-shadow: 0 2px 12px rgba(185,28,28,0.35);
}

.bot-bubble {
  max-width:82%;
  background: rgba(255,255,255,0.055);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:18px;
  border-top-left-radius:4px;
  padding:13px 16px;
  font-size:0.9rem;
  line-height:1.6;
  color:var(--cream);
  backdrop-filter:blur(8px);
}

.bot-bubble .np {
  font-family:'Noto Sans Devanagari',sans-serif;
  display:block;
  margin-top:8px;
  padding-top:8px;
  border-top:1px solid rgba(255,255,255,0.1);
  font-size:0.85rem;
  color:rgba(254,249,240,0.7);
  line-height:1.8;
}

/* User message */
.msg-user {
  display:flex;
  flex-direction:row-reverse;
  gap:10px;
  animation: bubbleInRight 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
}

.user-av {
  width:34px; height:34px;
  border-radius:50%;
  background: linear-gradient(135deg, var(--gold), #b45309);
  display:flex; align-items:center; justify-content:center;
  font-size:14px;
  flex-shrink:0;
  margin-top:2px;
}

.user-bubble {
  max-width:75%;
  background: linear-gradient(135deg, var(--red), var(--red-dark));
  border-radius:18px;
  border-top-right-radius:4px;
  padding:11px 16px;
  font-size:0.9rem;
  line-height:1.5;
  color:white;
  box-shadow: 0 4px 20px rgba(185,28,28,0.3);
}

/* Options */
.options-wrap {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding-left:44px;
  animation: fadeUp 0.4s ease 0.15s both;
}

.opt-btn {
  padding:9px 16px;
  border-radius:22px;
  border:1.5px solid rgba(185,28,28,0.4);
  background:rgba(185,28,28,0.07);
  color:var(--cream);
  font-family:'DM Sans',sans-serif;
  font-size:0.84rem;
  cursor:pointer;
  transition:all 0.2s;
  line-height:1.4;
  text-align:left;
}

.opt-btn:hover {
  background:var(--red);
  border-color:var(--red);
  transform:translateY(-1px);
  box-shadow: 0 6px 20px rgba(185,28,28,0.35);
}

/* Typing */
.typing-wrap {
  display:flex;
  gap:10px;
  animation: fadeUp 0.3s ease both;
}

.typing-bubble {
  background:rgba(255,255,255,0.055);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:18px;
  border-top-left-radius:4px;
  padding:14px 18px;
  display:flex; gap:5px; align-items:center;
}

.dot {
  width:7px; height:7px;
  border-radius:50%;
  background:var(--muted);
  animation:dotBounce 1.2s infinite;
}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

/* ── SURVEY SECTION ── */
.survey-wrap {
  padding-left:44px;
  animation: fadeUp 0.5s ease both;
}

.survey-card {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  padding:20px;
  backdrop-filter:blur(10px);
}

.survey-card h3 {
  font-family:'Playfair Display',serif;
  font-size:1rem;
  color:var(--cream);
  margin-bottom:4px;
}

.survey-card .survey-sub {
  font-size:0.78rem;
  color:var(--muted);
  margin-bottom:16px;
  line-height:1.5;
}

.survey-card .survey-sub .np-small {
  font-family:'Noto Sans Devanagari',sans-serif;
  display:block;
  margin-top:3px;
  font-size:0.75rem;
}

.form-row {
  margin-bottom:14px;
}

.form-row label {
  display:block;
  font-size:0.78rem;
  color:var(--muted);
  letter-spacing:0.04em;
  text-transform:uppercase;
  margin-bottom:6px;
}

.form-row select,
.form-row input[type="text"] {
  width:100%;
  padding:10px 14px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;
  color:var(--cream);
  font-family:'DM Sans',sans-serif;
  font-size:0.88rem;
  outline:none;
  transition:border-color 0.2s;
  appearance:none;
  cursor:pointer;
}

.form-row select:focus,
.form-row input[type="text"]:focus {
  border-color:rgba(185,28,28,0.6);
}

.form-row select option {
  background:#1c0a0a;
  color:var(--cream);
}

.form-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

/* Result card */
.result-card {
  border-radius:16px;
  padding:18px 20px;
  margin-bottom:4px;
  animation: fadeUp 0.5s ease both;
}

.result-card.low {
  background:rgba(22,163,74,0.1);
  border:1.5px solid rgba(22,163,74,0.3);
}
.result-card.medium {
  background:rgba(217,119,6,0.1);
  border:1.5px solid rgba(217,119,6,0.35);
}
.result-card.high {
  background:rgba(185,28,28,0.12);
  border:1.5px solid rgba(185,28,28,0.4);
}

.result-label {
  font-family:'Playfair Display',serif;
  font-size:1.1rem;
  margin-bottom:8px;
}
.low .result-label { color:#4ade80; }
.medium .result-label { color:var(--gold-light); }
.high .result-label { color:#f87171; }

.result-card p { font-size:0.87rem; line-height:1.65; opacity:0.88; }
.result-card .np-result {
  font-family:'Noto Sans Devanagari',sans-serif;
  font-size:0.82rem;
  color:rgba(254,249,240,0.6);
  margin-top:8px;
  padding-top:8px;
  border-top:1px solid rgba(255,255,255,0.09);
  line-height:1.9;
}

/* Clinic list */
.clinic-pill {
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:4px 12px;
  background:rgba(202,138,4,0.1);
  border:1px solid rgba(202,138,4,0.25);
  border-radius:12px;
  font-size:0.74rem;
  color:var(--gold-light);
  margin:0 0 6px 44px;
  letter-spacing:0.03em;
  animation: fadeUp 0.4s ease both;
}

.clinics {
  padding-left:44px;
  display:flex;
  flex-direction:column;
  gap:6px;
  animation: fadeUp 0.4s ease 0.1s both;
}

.clinic-item {
  padding:10px 14px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-left:3px solid var(--red);
  border-radius:8px;
  font-size:0.83rem;
  line-height:1.5;
}

.clinic-item strong { display:block; color:white; font-size:0.86rem; }
.clinic-item span { color:var(--muted); font-size:0.78rem; }

/* Submit button */
.submit-btn {
  width:100%;
  padding:14px 20px;
  background: linear-gradient(135deg, var(--red), var(--red-dark));
  border:none;
  border-radius:12px;
  color:white;
  font-family:'DM Sans',sans-serif;
  font-size:0.95rem;
  font-weight:600;
  cursor:pointer;
  transition:all 0.25s;
  margin-top:16px;
  letter-spacing:0.02em;
  box-shadow: 0 4px 20px rgba(185,28,28,0.35);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.submit-btn:hover {
  transform:translateY(-2px);
  box-shadow: 0 8px 30px rgba(185,28,28,0.5);
}

.submit-btn:disabled {
  opacity:0.6;
  cursor:not-allowed;
  transform:none;
}

/* Success */
.success-card {
  padding-left:44px;
  animation: fadeUp 0.5s ease both;
}

.success-inner {
  background:rgba(22,163,74,0.1);
  border:1.5px solid rgba(22,163,74,0.3);
  border-radius:16px;
  padding:20px;
  text-align:center;
}

.success-icon {
  font-size:2.5rem;
  margin-bottom:10px;
  animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}

.success-inner h3 {
  font-family:'Playfair Display',serif;
  font-size:1.1rem;
  color:#4ade80;
  margin-bottom:6px;
}

.success-inner p {
  font-size:0.85rem;
  color:var(--muted);
  line-height:1.6;
}

.success-inner .np-success {
  font-family:'Noto Sans Devanagari',sans-serif;
  display:block;
  margin-top:5px;
  font-size:0.8rem;
  color:rgba(156,163,175,0.7);
}

/* Action buttons */
.action-row {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding-left:44px;
  animation: fadeUp 0.4s ease 0.2s both;
}

.action-btn {
  padding:9px 16px;
  border-radius:22px;
  border:1.5px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.04);
  color:var(--muted);
  font-family:'DM Sans',sans-serif;
  font-size:0.82rem;
  cursor:pointer;
  transition:all 0.2s;
  display:flex; align-items:center; gap:5px;
}
.action-btn:hover { border-color:var(--gold-light); color:var(--gold-light); }

/* Stats bar */
.stats-bar {
  display:flex;
  gap:10px;
  padding:12px 16px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:12px;
  margin-bottom:8px;
  animation: fadeUp 0.4s ease both;
}

.stat-item {
  flex:1;
  text-align:center;
}

.stat-item .stat-val {
  font-family:'Playfair Display',serif;
  font-size:1.3rem;
  color:var(--cream);
  display:block;
}

.stat-item .stat-lbl {
  font-size:0.68rem;
  color:var(--muted);
  letter-spacing:0.05em;
  text-transform:uppercase;
}

/* Divider */
.divider {
  display:flex;
  align-items:center;
  gap:10px;
  padding-left:44px;
  opacity:0.35;
  margin:2px 0;
}
.divider span { font-size:0.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; white-space:nowrap; }
.divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.1); }

/* Footer */
.footer {
  position:fixed;
  bottom:0; left:0; right:0;
  padding:12px 20px 16px;
  background:linear-gradient(to top, rgba(15,5,5,0.98) 60%, transparent);
  display:flex;
  justify-content:center;
  z-index:10;
}

.footer-inner {
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 18px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
  backdrop-filter:blur(10px);
  font-size:0.73rem;
  color:var(--muted);
}

.footer-inner strong { color:var(--gold-light); }

/* Animations */
@keyframes fadeDown { from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
@keyframes bubbleIn { from{opacity:0;transform:scale(0.88) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)} }
@keyframes bubbleInRight { from{opacity:0;transform:scale(0.88) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)} }
@keyframes dotBounce { 0%,80%,100%{transform:translateY(0);opacity:0.5}40%{transform:translateY(-5px);opacity:1} }
@keyframes popIn { from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)} }

@media(max-width:480px){
  .header-titles h1{font-size:1.25rem;}
  .form-grid{grid-template-columns:1fr;}
  .bot-bubble,.user-bubble{max-width:92%;}
}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo">🎗️</div>
      <div class="header-titles">
        <h1>CRC Awareness <em>Nepal</em></h1>
        <p>ACG SCOPY 2026 · Global Health Initiative</p>
      </div>
    </div>
    <div class="lang-row">
      <button class="lang-btn active" onclick="setLang('both')" id="lb-both">EN + नेपाली</button>
      <button class="lang-btn" onclick="setLang('en')" id="lb-en">English</button>
      <button class="lang-btn" onclick="setLang('np')" id="lb-np">नेपाली</button>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-track"><div class="progress-fill" id="pFill"></div></div>
    <div class="progress-meta">
      <span id="pLabel">Ready to start</span>
      <span id="pPct">0%</span>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

</div>

<!-- Footer -->
<div class="footer">
  <div class="footer-inner">
    🏥 <strong>CRC Nepal Initiative</strong> · Free Public Health Tool · ACG SCOPY 2026
  </div>
</div>

<script>
// ── CONFIG ──
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwYZFaWkkQn2kyXvHW1YZbUKEXAi55j1o_4URcAQWx7szj-ttDAeV9CN4b4cqSx2fjM/exec';

let lang = 'both';
let score = 0;
let answers = {};
let stepIndex = 0;

// ── LANGUAGE ──
function setLang(l) {
  lang = l;
  ['both','en','np'].forEach(x => document.getElementById('lb-'+x).classList.remove('active'));
  document.getElementById('lb-'+l).classList.add('active');
}

function t(en, np) {
  if (lang === 'en') return en;
  if (lang === 'np') return `<span style="font-family:'Noto Sans Devanagari',sans-serif;line-height:1.9;font-size:0.9rem">${np}</span>`;
  return en + `<span class="np">${np}</span>`;
}

// ── PROGRESS ──
function setProgress(pct, label) {
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('pLabel').textContent = label;
  document.getElementById('pPct').textContent = pct + '%';
}

// ── SCROLL ──
function scrollBot() {
  setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 80);
}

// ── ADD MESSAGES ──
function addBotMsg(en, np, delay = 800) {
  return new Promise(resolve => {
    const typing = document.createElement('div');
    typing.className = 'typing-wrap';
    typing.innerHTML = `<div class="bot-av">🎗️</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    document.getElementById('messages').appendChild(typing);
    scrollBot();
    setTimeout(() => {
      typing.remove();
      const msg = document.createElement('div');
      msg.className = 'msg-bot';
      const content = lang === 'en' ? en : lang === 'np'
        ? `<span style="font-family:'Noto Sans Devanagari',sans-serif;line-height:1.9">${np}</span>`
        : en + `<span class="np">${np}</span>`;
      msg.innerHTML = `<div class="bot-av">🎗️</div><div class="bot-bubble">${content.replace(/\n/g,'<br>')}</div>`;
      document.getElementById('messages').appendChild(msg);
      scrollBot();
      resolve();
    }, delay);
  });
}

function addUserMsg(en, np) {
  const msg = document.createElement('div');
  msg.className = 'msg-user';
  const content = lang === 'np' ? np : en;
  msg.innerHTML = `<div class="user-av">👤</div><div class="user-bubble">${content}</div>`;
  document.getElementById('messages').appendChild(msg);
  scrollBot();
}

function addOptions(opts) {
  const wrap = document.createElement('div');
  wrap.className = 'options-wrap';
  wrap.id = 'cur-opts';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = lang === 'en' ? o.en : lang === 'np' ? o.np
      : `${o.en} <small style="opacity:0.55;font-family:'Noto Sans Devanagari',sans-serif;font-size:0.78em"> / ${o.np}</small>`;
    btn.onclick = () => pickOption(o);
    wrap.appendChild(btn);
  });
  document.getElementById('messages').appendChild(wrap);
  scrollBot();

async function pickOption(opt) {
  removeOptions();
  addUserMsg(opt.en, opt.np);
  if (opt.score !== undefined) score += opt.score;
  const curStep = steps[stepIndex];
  if (curStep && curStep.key) answers[curStep.key] = opt.en;
  if (opt.next === 'survey') {
    setProgress(95, 'Almost done...');
    await showResultThenSurvey();
  } else {
    stepIndex = opt.next;
    await runStep(stepIndex);
  }
}

async function runStep(i) {
  const s = steps[i];
  setProgress(s.progress, s.pLabel);
  await addBotMsg(s.en, s.np);
  addOptions(s.options);
}

// ── SUBMIT TO GOOGLE SHEETS ──
async function submitData(riskLevel, riskClass) {
  const btn = document.getElementById('submitBtn');
  const txt = document.getElementById('submitText');

  const gender   = document.getElementById('f-gender').value;
  const province = document.getElementById('f-province').value;
  const source   = document.getElementById('f-source').value;
  const district = document.getElementById('f-district').value;

  if (!gender || !province || !source) {
    // Shake effect
    btn.style.animation = 'none';
    btn.style.background = 'linear-gradient(135deg,#7f1d1d,#450a0a)';
    txt.textContent = '⚠️ Please fill all required fields';
    setTimeout(() => {
      btn.style.background = '';
      txt.textContent = '✅ Submit & Save Results';
    }, 2000);
    return;
  }

  btn.disabled = true;
  txt.textContent = '⏳ Saving your data...';

  const payload = {
    age:       answers.age       || '',
    gender:    gender,
    province:  province,
    district:  district,
    family:    answers.family    || '',
    blood:     answers.blood     || '',
    symptoms:  answers.symptoms  || '',
    lifestyle: answers.lifestyle || '',
    screening: answers.screening || '',
    score:     score,
    riskLevel: riskLevel,
    howFound:  source
  };

  try {
    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    showSuccess(riskClass);
  } catch (err) {
    btn.disabled = false;
    txt.textContent = '❌ Error — Please try again';
    setTimeout(() => { txt.textContent = '✅ Submit & Save Results'; }, 3000);
  }
}

function showSuccess(riskClass) {
  // Replace survey card
  document.querySelector('.survey-wrap').remove();
  setProgress(100, 'Complete! ✅');

  const sc = document.createElement('div');
  sc.className = 'success-card';
  sc.innerHTML = `
    <div class="success-inner">
      <div class="success-icon">🎉</div>
      <h3>Thank You! Data Saved Successfully</h3>
      <p>Your response has been recorded in Nepal's CRC awareness database. You are helping save lives.
        <span class="np-success">तपाईंको जवाफ नेपालको CRC जागरूकता डेटाबेसमा सुरक्षित भयो। तपाईं जीवन बचाउन मद्दत गर्दै हुनुहुन्छ।</span>
      </p>
    </div>`;
  document.getElementById('messages').appendChild(sc);
  scrollBot();

  setTimeout(async () => {
    await addBotMsg(
      "Colorectal cancer is one of the most preventable cancers when detected early. Please share this tool with your family and community — it could save a life. 💙",
      "कोलोरेक्टल क्यान्सर चाँडो पत्ता लागेमा सबैभन्दा रोक्न सकिने क्यान्सरहरूमध्ये एक हो। कृपया यो उपकरण आफ्नो परिवार र समुदायसँग साझा गर्नुहोस् — यसले जीवन बचाउन सक्छ। 💙",
    600);

    const ar = document.createElement('div');
    ar.className = 'action-row';
    ar.innerHTML = `
      <button class="action-btn" onclick="copyLink()">📋 Copy Link</button>
      <button class="action-btn" onclick="window.print()">🖨️ Print</button>
      <button class="action-btn" onclick="restartChat()">↩ Start Over</button>`;
    document.getElementById('messages').appendChild(ar);
    scrollBot();
  }, 800);
}

function copyLink() {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(window.location.href)
      .then(() => alert('Link copied! Share it to spread CRC awareness.\nलिंक कपी भयो! CRC जागरूकता फैलाउन साझा गर्नुहोस्।'));
  }
}

function restartChat() {
  score = 0; answers = {}; stepIndex = 0;
  document.getElementById('messages').innerHTML = '';
  setProgress(0, 'Ready to start');
  startChat();
}

async function startChat() {
  await runStep(0);
}

startChat();
